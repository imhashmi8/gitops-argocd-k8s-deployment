apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nginx-mono
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/imhashmi8/gitops-argocd-k8s-deployment.git
    targetRevision: main
    path: argocd-declarative/mono-application/nginx/app
  destination:
    server: https://kubernetes.default.svc
    namespace: nginx
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
